name: Extensions

on:
  push:
    paths: ['plugins/**']
  pull_request:
    paths: ['plugins/**']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate plugin structure and content
        run: npx tsx --test plugins/test/extensions.test.ts
