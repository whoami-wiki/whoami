name: Desktop E2E

on:
  push:
    paths:
      - 'desktop/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'desktop/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  e2e:
    strategy:
      matrix:
        os: [macos-latest, macos-13]  # ARM + Intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install
        working-directory: desktop

      - name: Build desktop app
        run: pnpm build
        working-directory: desktop

      - name: Install Playwright
        run: npx playwright install --with-deps
        working-directory: desktop

      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: desktop
