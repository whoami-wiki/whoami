name: Release

on:
  push:
    tags: ['cli-v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install
        run: pnpm install
        working-directory: cli

      - name: Build
        run: pnpm build
        working-directory: cli

      - name: Verify build
        run: node dist/wai.cjs --version
        working-directory: cli

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF_NAME#cli-v}"
          mkdir -p "wai-v${VERSION}/bin"
          cp cli/dist/wai.cjs "wai-v${VERSION}/bin/wai"
          tar -czf "wai-v${VERSION}.tar.gz" "wai-v${VERSION}"
          shasum -a 256 "wai-v${VERSION}.tar.gz" > "wai-v${VERSION}.tar.gz.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wai-v*.tar.gz
            wai-v*.tar.gz.sha256
          body_path: cli/RELEASE_NOTES.md
          make_latest: "false"
