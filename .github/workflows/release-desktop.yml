name: Release Desktop

on:
  push:
    tags: ['desktop-v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install
        working-directory: desktop

      - name: Build PHP
        run: bash scripts/build-php.sh
        working-directory: desktop

      - name: Bundle MediaWiki
        run: bash scripts/bundle-mediawiki.sh
        working-directory: desktop

      - name: Bundle Lua
        run: bash scripts/bundle-lua.sh
        working-directory: desktop

      - name: Build
        run: pnpm dist
        working-directory: desktop

      - name: Publish release
        run: gh release create "$GITHUB_REF_NAME" desktop/dist-electron/*.{dmg,zip} --notes-file desktop/RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
