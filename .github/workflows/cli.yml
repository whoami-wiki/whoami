name: CLI

on:
  push:
    paths: ['cli/**']
  pull_request:
    paths: ['cli/**']

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install
        run: pnpm install
        working-directory: cli

      - name: Unit tests
        run: pnpm test
        working-directory: cli

  install-script:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install
        working-directory: cli

      - name: Run install/build tests
        run: bash test/install.test.sh
        working-directory: cli
