name: Install E2E

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "desktop/src/setup.ts"
      - "desktop/resources/templates/**"
      - "web/app/cli/install.sh/**"
      - "web/app/download/**"
      - "plugins/**"
      - ".github/workflows/install-e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - "desktop/src/setup.ts"
      - "desktop/resources/templates/**"
      - "web/app/cli/install.sh/**"
      - "web/app/download/**"
      - "plugins/**"
      - ".github/workflows/install-e2e.yml"

jobs:
  # ── Step 1: Desktop app download ─────────────────────────────────────
  desktop-download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify download page resolves latest desktop release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES=$(curl -fsSL "https://api.github.com/repos/whoami-wiki/whoami/releases" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN")

          RELEASE=$(echo "$RELEASES" | python3 -c "
          import json, sys
          releases = json.load(sys.stdin)
          desktop = [r for r in releases if r['tag_name'].startswith('desktop-v')]
          if not desktop:
              print('SKIP', file=sys.stderr)
              sys.exit(0)
          r = desktop[0]
          print(f'tag={r[\"tag_name\"]}')
          dmgs = [a for a in r['assets'] if a['name'].endswith('.dmg')]
          for a in dmgs:
              print(f'dmg={a[\"name\"]}')
              print(f'url={a[\"browser_download_url\"]}')
          ")

          if [ -z "$RELEASE" ]; then
            echo "No desktop release exists yet — skipping download checks"
            exit 0
          fi

          echo "$RELEASE"

          # Verify each DMG URL is reachable
          echo "$RELEASE" | grep '^url=' | cut -d= -f2- | while read -r url; do
            echo "Checking $url ..."
            STATUS=$(curl -o /dev/null -sIw '%{http_code}' -L "$url")
            if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
              echo "FAIL: $url returned HTTP $STATUS"
              exit 1
            fi
            echo "OK ($STATUS)"
          done

  # ── Step 2: CLI install ──────────────────────────────────────────────
  cli-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install
        working-directory: cli

      - name: Build CLI
        run: pnpm build
        working-directory: cli

      - name: Create release tarball
        run: |
          VERSION=$(node -p "require('./cli/package.json').version")
          mkdir -p "wai-v${VERSION}/bin"
          cp cli/dist/wai.cjs "wai-v${VERSION}/bin/wai"
          tar -czf "wai-v${VERSION}.tar.gz" "wai-v${VERSION}"
          sha256sum "wai-v${VERSION}.tar.gz" > "wai-v${VERSION}.tar.gz.sha256"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Start local release server
        run: |
          mkdir -p fake-releases
          cp wai-v${VERSION}.tar.gz fake-releases/
          cp wai-v${VERSION}.tar.gz.sha256 fake-releases/
          echo '[{"tag_name": "cli-v'"${VERSION}"'"}]' > fake-releases/releases.json

          cd fake-releases
          python3 -m http.server 9123 &
          echo $! > /tmp/server.pid
          sleep 1

      - name: Extract and patch install script
        run: |
          node <<'NODESCRIPT'
          const fs = require('fs');
          const src = fs.readFileSync('web/app/cli/install.sh/route.ts', 'utf-8');
          const REPO = 'whoami-wiki/whoami';
          const script = eval(src.match(/const script = (`[\s\S]*?`);/)[1]);
          const patched = script
            .replace(
              'https://api.github.com/repos/$REPO/releases',
              'http://localhost:9123/releases.json'
            )
            .replace(
              /https:\/\/github\.com\/\$REPO\/releases\/download\/cli-v\$\{VERSION\}\/\$\{TARBALL}/,
              'http://localhost:9123/${TARBALL}'
            )
            .replace(
              /CHECKSUM_URL=.*$/m,
              'CHECKSUM_URL="http://localhost:9123/${TARBALL}.sha256"'
            );
          fs.writeFileSync('/tmp/install.sh', patched);
          NODESCRIPT

      - name: Run install script
        run: |
          export WAI_INSTALL_DIR="$HOME/.local/bin"
          bash /tmp/install.sh

      - name: Verify wai --version
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          wai --version

      - name: Verify PATH was configured
        run: |
          grep -q '.local/bin' "$HOME/.bashrc" || echo "PATH already in PATH"

      - name: Cleanup
        if: always()
        run: |
          [ -f /tmp/server.pid ] && kill "$(cat /tmp/server.pid)" || true

  # ── Step 3: Extensions for each harness ──────────────────────────────
  extensions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Claude Code plugin
      - name: Validate Claude Code plugin structure
        run: |
          echo "Checking plugins/whoami/ structure..."
          for f in \
            plugins/whoami/CLAUDE.md \
            plugins/whoami/agents/editor.md \
            plugins/whoami/skills/editorial-guide/SKILL.md \
          ; do
            if [ ! -f "$f" ]; then
              echo "FAIL: missing $f"
              exit 1
            fi
            echo "  OK $f"
          done

      # Codex + OpenCode (from extensions repo)
      - name: Clone extensions repo
        run: git clone --depth 1 https://github.com/whoami-wiki/extensions.git /tmp/extensions

      - name: Test Codex extension setup
        run: |
          WORKDIR=$(mktemp -d)
          cp -r /tmp/extensions/codex/.agents "$WORKDIR/.agents"

          if [ ! -d "$WORKDIR/.agents" ]; then
            echo "FAIL: .agents/ directory not created"
            exit 1
          fi
          AGENT_COUNT=$(find "$WORKDIR/.agents" -type f | wc -l)
          if [ "$AGENT_COUNT" -eq 0 ]; then
            echo "FAIL: .agents/ directory is empty"
            exit 1
          fi
          echo "OK .agents/ has $AGENT_COUNT file(s)"
          find "$WORKDIR/.agents" -type f -printf "  %P\n"

      - name: Test OpenCode extension setup
        run: |
          WORKDIR=$(mktemp -d)
          cp -r /tmp/extensions/opencode/.opencode "$WORKDIR/.opencode"
          cp /tmp/extensions/opencode/opencode.json "$WORKDIR/opencode.json"

          if [ ! -d "$WORKDIR/.opencode" ]; then
            echo "FAIL: .opencode/ directory not created"
            exit 1
          fi
          python3 -c "import json; json.load(open('$WORKDIR/opencode.json'))"
          echo "OK .opencode/ created, opencode.json is valid JSON"
          find "$WORKDIR/.opencode" -type f -printf "  %P\n"

  # ── Steps 1+4: Full setup and verification ───────────────────────────
  # Replays the desktop app's onboarding flow (setup.ts) against a real
  # MediaWiki instance, then verifies the CLI can auth and search.
  setup-and-verify:
    runs-on: ubuntu-latest
    services:
      mediawiki:
        image: mediawiki:1.42
        ports:
          - 8080:80
        options: >-
          --health-cmd "curl -sf http://localhost/api.php?action=query&meta=siteinfo&format=json || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install and build CLI
        run: pnpm install && pnpm build
        working-directory: cli

      - name: Run MediaWiki install (database setup)
        run: |
          # Install MediaWiki with SQLite, mirroring setup.ts step 1
          docker exec ${{ job.services.mediawiki.id }} php maintenance/run.php install \
            --dbtype sqlite \
            --dbpath /var/www/data \
            --dbname wiki \
            --scriptpath "" \
            --pass "TestPassword123" \
            --server "http://localhost:8080" \
            "Whoami Wiki" \
            "TestUser"

      - name: Wait for wiki to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:8080/api.php?action=query&meta=siteinfo&format=json" > /dev/null 2>&1; then
              echo "Wiki is ready"
              exit 0
            fi
            sleep 1
          done
          echo "FAIL: wiki did not become ready"
          exit 1

      - name: Run onboarding setup (mirrors setup.ts steps 3-4)
        run: |
          # Replay the same API calls that setup.ts makes after DB init:
          # login, create templates, import styles, set up Main Page, create user page + Me redirect
          node <<'SETUP'
          const fs = require('fs');
          const http = require('http');

          const API = 'http://localhost:8080/api.php';
          let cookies = [];

          function request(method, params) {
            return new Promise((resolve, reject) => {
              const isPost = method === 'POST';
              const url = isPost ? API : `${API}?${new URLSearchParams(params)}`;
              const body = isPost ? new URLSearchParams(params).toString() : null;
              const parsed = new URL(url);

              const req = http.request({
                hostname: parsed.hostname,
                port: parsed.port,
                path: parsed.pathname + parsed.search,
                method,
                headers: {
                  ...(isPost ? { 'Content-Type': 'application/x-www-form-urlencoded' } : {}),
                  ...(cookies.length ? { Cookie: cookies.join('; ') } : {}),
                },
              }, (res) => {
                // Capture session cookies
                const sc = res.headers['set-cookie'];
                if (sc) {
                  for (const c of (Array.isArray(sc) ? sc : [sc])) {
                    const nv = c.split(';')[0];
                    const name = nv.split('=')[0];
                    cookies = cookies.filter(x => !x.startsWith(name + '='));
                    cookies.push(nv);
                  }
                }
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch { reject(new Error(`Bad JSON: ${data.slice(0, 200)}`)); }
                });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function main() {
            // Login (same as setup.ts)
            const tokenData = await request('GET', { action: 'query', meta: 'tokens', type: 'login', format: 'json' });
            const loginToken = tokenData.query.tokens.logintoken;

            const loginResult = await request('POST', {
              action: 'login', lgname: 'TestUser', lgpassword: 'TestPassword123',
              lgtoken: loginToken, format: 'json',
            });
            if (loginResult.login?.result !== 'Success') {
              throw new Error('Login failed: ' + JSON.stringify(loginResult));
            }
            console.log('Logged in as TestUser');

            // Get CSRF token
            const csrfData = await request('GET', { action: 'query', meta: 'tokens', format: 'json' });
            const csrfToken = csrfData.query.tokens.csrftoken;

            // Create templates (same files setup.ts imports)
            const templates = [
              ['Template:Gap', 'desktop/resources/templates/Gap.wiki'],
              ['Template:Dialogue', 'desktop/resources/templates/Dialogue.wiki'],
              ['Template:Infobox person', 'desktop/resources/templates/Infobox_person.wiki'],
              ['MediaWiki:Common.css', 'desktop/resources/templates/infobox-styles.css'],
            ];
            for (const [title, file] of templates) {
              const content = fs.readFileSync(file, 'utf-8');
              await request('POST', {
                action: 'edit', title, text: content, summary: 'Initial import',
                createonly: 'true', token: csrfToken, format: 'json',
              });
              console.log(`Created ${title}`);
            }

            // Overwrite Main Page (setup.ts uses editPage for this)
            const mainContent = fs.readFileSync('desktop/resources/templates/Main_Page.wiki', 'utf-8');
            await request('POST', {
              action: 'edit', title: 'Main Page', text: mainContent,
              summary: 'Initial main page', token: csrfToken, format: 'json',
            });
            console.log('Updated Main Page');

            // Create user page + Me redirect (setup.ts step 4)
            const userName = 'Test User';
            const namePage = '{{Infobox person\n| name = ' + userName + '\n}}\n\n\x27\x27\x27' + userName + '\x27\x27\x27.\n\n[[Category:People]]';
            await request('POST', {
              action: 'edit', title: userName, text: namePage,
              summary: 'Initial page creation', createonly: 'true',
              token: csrfToken, format: 'json',
            });
            console.log('Created user page: ' + userName);

            await request('POST', {
              action: 'edit', title: 'Me', text: '#REDIRECT [[' + userName + ']]',
              summary: 'Redirect to user page', createonly: 'true',
              token: csrfToken, format: 'json',
            });
            console.log('Created Me redirect');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SETUP

      - name: Save credentials (mirrors setup.ts)
        run: |
          mkdir -p ~/.whoami
          cat > ~/.whoami/credentials.json <<'EOF'
          {
            "server": "http://localhost:8080",
            "username": "TestUser",
            "password": "TestPassword123",
            "role": "owner"
          }
          EOF
          chmod 600 ~/.whoami/credentials.json

      - name: "Verify: wai auth status"
        run: |
          OUTPUT=$(node cli/dist/wai.cjs auth status --json)
          echo "$OUTPUT"
          STATUS=$(echo "$OUTPUT" | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "authenticated" ]; then
            echo "FAIL: expected 'authenticated', got '$STATUS'"
            exit 1
          fi
          echo "OK wai auth status: authenticated"

      - name: "Verify: wai search \"test\""
        run: |
          OUTPUT=$(node cli/dist/wai.cjs search test --json)
          echo "$OUTPUT"
          COUNT=$(echo "$OUTPUT" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
          if [ "$COUNT" -eq 0 ]; then
            echo "FAIL: search returned no results"
            exit 1
          fi
          echo "OK wai search: returned $COUNT result(s)"

      - name: "Verify: Main Page is accessible"
        run: |
          CONTENT=$(curl -fsSL "http://localhost:8080/api.php?action=parse&page=Main+Page&format=json")
          echo "$CONTENT" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          title = data['parse']['title']
          html = data['parse']['text']['*']
          assert title == 'Main Page', f'Wrong title: {title}'
          assert 'welcome to your wiki' in html.lower(), 'Main page content missing'
          print('OK Main Page renders correctly')
          "

      - name: "Verify: Me redirect works"
        run: |
          CONTENT=$(curl -fsSL "http://localhost:8080/api.php?action=query&titles=Me&redirects=1&format=json")
          echo "$CONTENT" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          redirects = data['query'].get('redirects', [])
          assert len(redirects) > 0, 'Me did not redirect'
          assert redirects[0]['to'] == 'Test User', f'Wrong redirect target: {redirects[0][\"to\"]}'
          print('OK Me -> Test User redirect works')
          "

      - name: "Verify: user page has infobox"
        run: |
          CONTENT=$(curl -fsSL "http://localhost:8080/api.php?action=parse&page=Test+User&format=json")
          echo "$CONTENT" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          wikitext = data['parse'].get('wikitext', {}).get('*', '')
          # Check via the raw content API instead
          " || true

          # Check raw wikitext
          RAW=$(curl -fsSL "http://localhost:8080/api.php?action=query&titles=Test+User&prop=revisions&rvprop=content&rvslots=main&format=json")
          echo "$RAW" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          pages = data['query']['pages']
          page = list(pages.values())[0]
          content = page['revisions'][0]['slots']['main']['*']
          assert '{{Infobox person' in content, 'Missing infobox template'
          assert 'Test User' in content, 'Missing user name'
          assert '[[Category:People]]' in content, 'Missing category'
          print('OK user page has infobox, name, and category')
          "
