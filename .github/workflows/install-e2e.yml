name: Install E2E

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "desktop/src/**"
      - "desktop/resources/templates/**"
      - "desktop/test/**"
      - "web/app/cli/install.sh/**"
      - "plugins/**"
      - ".github/workflows/install-e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - "desktop/src/**"
      - "desktop/resources/templates/**"
      - "desktop/test/**"
      - "web/app/cli/install.sh/**"
      - "plugins/**"
      - ".github/workflows/install-e2e.yml"

jobs:
  # ── Step 1+2: CLI install ────────────────────────────────────────────
  cli-install:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install
        working-directory: cli

      - name: Build CLI
        run: pnpm build
        working-directory: cli

      - name: Create release tarball
        run: |
          VERSION=$(node -p "require('./cli/package.json').version")
          mkdir -p "wai-v${VERSION}/bin"
          cp cli/dist/wai.cjs "wai-v${VERSION}/bin/wai"
          tar -czf "wai-v${VERSION}.tar.gz" "wai-v${VERSION}"
          shasum -a 256 "wai-v${VERSION}.tar.gz" > "wai-v${VERSION}.tar.gz.sha256"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Start local release server
        run: |
          mkdir -p fake-releases
          cp wai-v${VERSION}.tar.gz fake-releases/
          cp wai-v${VERSION}.tar.gz.sha256 fake-releases/
          echo '[{"tag_name": "cli-v'"${VERSION}"'"}]' > fake-releases/releases.json

          cd fake-releases
          python3 -m http.server 9123 &
          echo $! > /tmp/server.pid
          sleep 1

      - name: Extract and patch install script
        run: |
          node <<'NODESCRIPT'
          const fs = require('fs');
          const src = fs.readFileSync('web/app/cli/install.sh/route.ts', 'utf-8');
          const REPO = 'whoami-wiki/whoami';
          const script = eval(src.match(/const script = (`[\s\S]*?`);/)[1]);
          const patched = script
            .replace(
              'https://api.github.com/repos/$REPO/releases',
              'http://localhost:9123/releases.json'
            )
            .replace(
              /https:\/\/github\.com\/\$REPO\/releases\/download\/cli-v\$\{VERSION\}\/\$\{TARBALL}/,
              'http://localhost:9123/${TARBALL}'
            )
            .replace(
              /CHECKSUM_URL=.*$/m,
              'CHECKSUM_URL="http://localhost:9123/${TARBALL}.sha256"'
            );
          fs.writeFileSync('/tmp/install.sh', patched);
          NODESCRIPT

      - name: Run install script
        run: |
          export WAI_INSTALL_DIR="$HOME/.local/bin"
          bash /tmp/install.sh

      - name: Verify wai --version
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          wai --version

      - name: Verify PATH was configured
        run: |
          grep -q '.local/bin' "$HOME/.zshrc" || echo "PATH already in PATH"

      - name: Cleanup
        if: always()
        run: |
          [ -f /tmp/server.pid ] && kill "$(cat /tmp/server.pid)" || true

  # ── Step 3: Extensions for each harness ──────────────────────────────
  extensions:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Claude Code plugin
      - name: Validate Claude Code plugin structure
        run: |
          echo "Checking plugins/whoami/ structure..."
          for f in \
            plugins/whoami/CLAUDE.md \
            plugins/whoami/agents/editor.md \
            plugins/whoami/skills/editorial-guide/SKILL.md \
          ; do
            if [ ! -f "$f" ]; then
              echo "FAIL: missing $f"
              exit 1
            fi
            echo "  OK $f"
          done

      # Codex + OpenCode (from extensions repo)
      - name: Clone extensions repo
        run: git clone --depth 1 https://github.com/whoami-wiki/extensions.git /tmp/extensions

      - name: Test Codex extension setup
        run: |
          WORKDIR=$(mktemp -d)
          cp -r /tmp/extensions/codex/.agents "$WORKDIR/.agents"

          if [ ! -d "$WORKDIR/.agents" ]; then
            echo "FAIL: .agents/ directory not created"
            exit 1
          fi
          AGENT_COUNT=$(find "$WORKDIR/.agents" -type f | wc -l)
          if [ "$AGENT_COUNT" -eq 0 ]; then
            echo "FAIL: .agents/ directory is empty"
            exit 1
          fi
          echo "OK .agents/ has $AGENT_COUNT file(s)"
          find "$WORKDIR/.agents" -type f | sed "s|$WORKDIR/||"

      - name: Test OpenCode extension setup
        run: |
          WORKDIR=$(mktemp -d)
          cp -r /tmp/extensions/opencode/.opencode "$WORKDIR/.opencode"
          cp /tmp/extensions/opencode/opencode.json "$WORKDIR/opencode.json"

          if [ ! -d "$WORKDIR/.opencode" ]; then
            echo "FAIL: .opencode/ directory not created"
            exit 1
          fi
          python3 -c "import json; json.load(open('$WORKDIR/opencode.json'))"
          echo "OK .opencode/ created, opencode.json is valid JSON"
          find "$WORKDIR/.opencode" -type f | sed "s|$WORKDIR/||"

  # ── Steps 1+4: Download app, run setup, verify ───────────────────────
  # Downloads the latest released DMG, installs the app, drives the
  # setup wizard with Playwright, then verifies the wiki is running
  # and the CLI can authenticate against it.
  setup-and-verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install and build CLI
        run: pnpm install && pnpm build
        working-directory: cli

      - name: Download latest desktop release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the latest desktop-v* release and its arm64 DMG
          RELEASE_JSON=$(curl -fsSL "https://api.github.com/repos/whoami-wiki/whoami/releases" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN")

          DMG_URL=$(echo "$RELEASE_JSON" | python3 -c "
          import json, sys
          releases = json.load(sys.stdin)
          desktop = [r for r in releases if r['tag_name'].startswith('desktop-v')]
          if not desktop:
              print('SKIP', file=sys.stderr)
              sys.exit(1)
          assets = desktop[0]['assets']
          dmgs = [a for a in assets if a['name'].endswith('.dmg') and 'arm64' in a['name']]
          if not dmgs:
              # Fall back to any DMG
              dmgs = [a for a in assets if a['name'].endswith('.dmg')]
          if not dmgs:
              print('No DMG found', file=sys.stderr)
              sys.exit(1)
          print(dmgs[0]['browser_download_url'])
          ")

          echo "Downloading $DMG_URL ..."
          curl -fsSL -o /tmp/whoami.dmg "$DMG_URL"
          echo "Downloaded $(du -h /tmp/whoami.dmg | cut -f1)"

      - name: Install app from DMG
        run: |
          hdiutil attach /tmp/whoami.dmg -nobrowse -quiet
          cp -R "/Volumes/whoami/whoami.app" /Applications/
          hdiutil detach "/Volumes/whoami" -quiet

          # Remove quarantine so macOS doesn't block the unsigned launch
          xattr -rd com.apple.quarantine /Applications/whoami.app

          echo "Installed to /Applications/whoami.app"
          # Read version from Info.plist (don't launch the Electron binary directly)
          echo "Version: $(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' /Applications/whoami.app/Contents/Info.plist)"

      - name: Install Playwright
        run: npx playwright install

      - name: Run setup e2e test
        run: node desktop/test/setup-e2e.cjs
        timeout-minutes: 5

      - name: "Verify: wai auth status"
        run: |
          OUTPUT=$(node cli/dist/wai.cjs auth status --json)
          echo "$OUTPUT"
          STATUS=$(echo "$OUTPUT" | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "authenticated" ]; then
            echo "FAIL: expected 'authenticated', got '$STATUS'"
            exit 1
          fi
          echo "OK wai auth status: authenticated"

      - name: "Verify: wai search"
        run: |
          OUTPUT=$(node cli/dist/wai.cjs search wiki --json)
          echo "$OUTPUT"
          COUNT=$(echo "$OUTPUT" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
          if [ "$COUNT" -eq 0 ]; then
            echo "FAIL: search returned no results"
            exit 1
          fi
          echo "OK wai search: returned $COUNT result(s)"

      - name: Cleanup
        if: always()
        run: |
          [ -f /tmp/whoami-e2e.pid ] && kill "$(cat /tmp/whoami-e2e.pid)" 2>/dev/null || true
