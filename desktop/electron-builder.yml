appId: wiki.whoami.app
productName: whoami
copyright: Copyright © 2025 Jeremy Philemon

directories:
  output: dist-electron

files:
  - dist/**/*
  - renderer/**/*
  - "!src/**/*"
  - "!scripts/**/*"
  - "!.build/**/*"

extraResources:
  - from: resources/php
    to: resources/php
    filter:
      - "**/*"
  - from: resources/lua
    to: resources/lua
    filter:
      - "**/*"
  - from: resources/mediawiki
    to: resources/mediawiki
    filter:
      - "**/*"
      - "!extensions/Scribunto/includes/Engines/LuaStandalone/binaries"
      - "!tests"
  - from: resources/ffmpeg
    to: resources/ffmpeg
    filter:
      - "**/*"
  - from: resources/templates
    to: resources/templates
    filter:
      - "**/*"
  - from: ../cli/dist
    to: resources
    filter:
      - wai.cjs

afterSign: scripts/notarize.cjs

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: build/icon.icns
  darkModeSupport: true
  hardenedRuntime: true
  strictVerify: false
  notarize: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: "${productName}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
